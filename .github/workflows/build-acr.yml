name: Smart Retail Build

on:

 push:

   branches:
     - main

jobs:

 build:

   runs-on: ubuntu-latest

   steps:

   - name: Checkout Source

     uses: actions/checkout@v4

   - name: Login to ACR

     uses: docker/login-action@v3

     with:

       registry: ${{ secrets.ACR_LOGIN }}

       username: ${{ secrets.ACR_USR }}

       password: ${{ secrets.ACR_PASS }}

   - name: Build Catalog Image

     run: |

       docker build \
       -t ${{ secrets.ACR_LOGIN }}/catalog-service:${{ github.run_number }} \
       ./services/catalog-service

   - name: Push Catalog Image

     run: |

       docker push \
       ${{ secrets.ACR_LOGIN }}/catalog-service:${{ github.run_number }}

   - name: Build Frontend

     run: |

       docker build \
       -t ${{ secrets.ACR_LOGIN }}/frontend:${{ github.run_number }} \
       ./frontend

   - name: Push Frontend

     run: |

       docker push \
       ${{ secrets.ACR_LOGIN }}/frontend:${{ github.run_number }}

