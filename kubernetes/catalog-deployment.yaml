apiVersion: apps/v1

kind: Deployment

metadata:
 name: catalog-deployment

spec:

 replicas: 2

 selector:
   matchLabels:
     app: catalog

 template:

   metadata:

     labels:
       app: catalog

   spec:

     containers:

     - name: catalog

       image: catalog-serv:v4

       imagePullPolicy: Never

       ports:

       - containerPort: 3000

       env:

       - name: APP_ENV

         valueFrom:

           configMapKeyRef:

             name: catalog-config

             key: APP_ENV

       - name: APP_VERSION

         valueFrom:

           configMapKeyRef:

             name: catalog-config

             key: APP_VERSION

       - name: APP_NAME

         valueFrom:

           configMapKeyRef:

             name: catalog-config

             key: APP_NAME

       - name: DB_USERNAME

         valueFrom:

          secretKeyRef:

           name: catalog-secret

           key: DB_USERNAME

       - name: DB_PASSWORD

         valueFrom:

          secretKeyRef:

           name: catalog-secret

           key: DB_PASSWORD

